name: Documentation Build and Production Deploy CI

on:
  workflow_run:
    workflows: ["ESP32 Arduino Release", "Compilation Tests"]
    types:
      - completed
  workflow_dispatch:
  push:
    branches:
      - release/v2.x
      - master
    paths:
      - "docs/**"
      - ".github/workflows/docs_deploy.yml"

permissions:
  contents: read

jobs:
  deploy-prod-docs:
    name: Deploy Documentation on Production
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Check if release workflow is successful
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "Release workflow failed. Exiting..."
          exit 1

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.0.4
        with:
          cache-dependency-path: docs/requirements.txt
          cache: "pip"
          python-version: "3.10"

      - name: Restore docs binaries from cache (macOS builds)
        id: cache-restore
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          key: docs-binaries-macos-${{ github.run_id }}
          restore-keys: |
            docs-binaries-macos-
          path: docs_binaries
          lookup-only: false

      - name: Prepare cached binaries for documentation
        run: |
          python3 .github/scripts/docs_build_examples.py -p
          python3 .github/scripts/docs_build_examples.py -c

      - name: Deploy Documentation
        env:
          # Deploy to production server
          # DOCS_BUILD_DIR: "./docs/_build/"
          DOCS_DEPLOY_PRIVATEKEY: ${{ secrets.DOCS_KEY }}
          DOCS_DEPLOY_PATH: ${{ secrets.DOCS_PATH }}
          DOCS_DEPLOY_SERVER: ${{ secrets.DOCS_SERVER }}
          DOCS_DEPLOY_SERVER_USER: ${{ secrets.DOCS_USER }}
          DOCS_DEPLOY_URL_BASE: ${{ secrets.DOCS_URL }}
        run: |
          sudo apt update
          sudo apt install python3-pip python3-setuptools
          source ./docs/utils.sh
          add_doc_server_ssh_keys $DOCS_DEPLOY_PRIVATEKEY $DOCS_DEPLOY_SERVER $DOCS_DEPLOY_SERVER_USER
          export GIT_VER=$(git describe --always)
          echo "PIP install requirements..."
          pip3 install --user -r ./docs/requirements.txt
          echo "Building the Docs..."
          cd ./docs && build-docs -l en
          echo "Deploy the Docs..."
          export DOCS_BUILD_DIR=$GITHUB_WORKSPACE/docs/
          cd $GITHUB_WORKSPACE/docs
          deploy-docs
