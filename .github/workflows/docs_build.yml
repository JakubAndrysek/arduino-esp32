name: Documentation Build and Deploy CI

on:
  push:
    branches:
      - master
      - release/v2.x
      - docs/wokwi-embed
    paths:
      - "docs/**"
      - ".github/workflows/docs_build.yml"
      - "tests/**"
      - "cores/**"
      - "libraries/**"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs_build.yml"
      - "tests/**"
      - "cores/**"
      - "libraries/**"

permissions:
  contents: read

jobs:
  gen-matrix:
    name: Generate matrix for test builds
    runs-on: ubuntu-latest
    outputs:
      build-types: ${{ steps.set-matrix.outputs.build-types }}
      targets: ${{ steps.set-matrix.outputs.targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: .github/scripts/tests_matrix.sh

      - name: Set matrix
        id: set-matrix
        run: bash .github/scripts/tests_matrix.sh

  build-test-binaries:
    name: Build test binaries
    uses: ./.github/workflows/tests_build.yml
    needs: gen-matrix
    strategy:
      matrix:
        type: ${{ fromJson(needs.gen-matrix.outputs.build-types) }}
        chip: ${{ fromJson(needs.gen-matrix.outputs.targets) }}
    with:
      type: ${{ matrix.type }}
      chip: ${{ matrix.chip }}

  build-docs:
    name: Build ESP-Docs
    runs-on: ubuntu-22.04
    needs: build-test-binaries
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Download all test binary artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: test-bin-*
          path: ./test-binaries
          merge-multiple: true

      - name: Create docs binaries directory and copy all files with structure
        run: |
          mkdir -p ./docs/_static/binaries
          # Copy entire test-binaries directory structure to docs/_static/binaries
          if [ -d "./test-binaries" ]; then
            cp -r ./test-binaries/* ./docs/_static/binaries/
            echo "Copied test binaries with original structure preserved"
          else
            echo "No test-binaries directory found"
          fi

          # List all copied files recursively
          echo "Available files for web ESP simulator:"
          find ./docs/_static/binaries -type f | sort

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.0.4
        with:
          cache-dependency-path: docs/requirements.txt
          cache: "pip"
          python-version: "3.10"

      - name: Build
        run: |
          sudo apt update
          sudo apt install python3-pip python3-setuptools
          # GitHub CI installs pip3 and setuptools outside the path.
          # Update the path to include them and run.
          cd ./docs
          PATH=/home/runner/.local/bin:$PATH pip3 install -r requirements.txt --prefer-binary
          PATH=/home/runner/.local/bin:$PATH SPHINXOPTS="-W" build-docs -l en

      - name: Archive Docs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docs
          path: docs
